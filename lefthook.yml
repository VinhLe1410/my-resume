pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,json,css,svelte,html}"
      run: pnpm exec prettier --write --ignore-unknown {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,svelte}"
      run: pnpm exec eslint --fix --no-warn-ignored {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx,svelte}"
      run: pnpm --filter front-end check
